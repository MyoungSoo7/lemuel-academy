name: build-push-scan

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  backend:
    name: 'backend ${{ matrix.service }}'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [user-service, catalog-service, media-service, api-gateway]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21 }

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build jar
        working-directory: services/${{ matrix.service }}
        run: gradle --no-daemon bootJar -x test

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        working-directory: services/${{ matrix.service }}
        run: |
          IMAGE=ghcr.io/myoungsoo7/academy-${{ matrix.service }}
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ghcr.io/myoungsoo7/academy-${{ matrix.service }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles(format('trivy-{0}.sarif', matrix.service)) != ''
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

      - name: Push image
        run: |
          IMAGE=ghcr.io/myoungsoo7/academy-${{ matrix.service }}
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

  frontend:
    name: 'frontend ${{ matrix.app }}'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [learner, creator-studio, admin]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install + build
        working-directory: frontend/${{ matrix.app }}
        env:
          NEXT_PUBLIC_API_BASE: https://academy.lemuel.co.kr
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push image
        working-directory: frontend/${{ matrix.app }}
        run: |
          IMAGE=ghcr.io/myoungsoo7/academy-${{ matrix.app }}
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ghcr.io/myoungsoo7/academy-${{ matrix.app }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.app }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles(format('trivy-{0}.sarif', matrix.app)) != ''
        with:
          sarif_file: trivy-${{ matrix.app }}.sarif
          category: trivy-${{ matrix.app }}
