services:
  postgres:
    image: postgres:17-alpine
    container_name: academy-postgres
    environment:
      POSTGRES_DB: academy
      POSTGRES_USER: academy
      POSTGRES_PASSWORD: academy
    ports: ["127.0.0.1:5439:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../infra/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U academy"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: academy-redis
    ports: ["127.0.0.1:6389:6379"]
    volumes:
      - redis_data:/data

  ffmpeg-worker:
    build:
      context: ../services/media-service
      dockerfile: Dockerfile.worker
    container_name: academy-ffmpeg-worker
    environment:
      REDIS_URL: redis://redis:6379
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_BUCKET: ${R2_BUCKET:-lemuel-academy}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY}
      R2_SECRET_KEY: ${R2_SECRET_KEY}
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4g

volumes:
  postgres_data:
  redis_data:
