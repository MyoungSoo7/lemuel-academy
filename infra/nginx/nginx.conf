events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 200m;  # 영상 업로드는 R2 presigned 직접이지만 form 여유

    # 업스트림 정의
    upstream learner    { server learner:3001; }
    upstream studio     { server creator-studio:3002; }
    upstream admin      { server admin:3003; }
    upstream apigateway { server api-gateway:8080; }

    server {
        listen 80;
        server_name _;

        # /api → api-gateway
        location /api/ {
            proxy_pass http://apigateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # /actuator → api-gateway (헬스체크용 디버그)
        location /actuator/ {
            proxy_pass http://apigateway;
            proxy_set_header Host $host;
        }

        # /studio → creator-studio (basePath: /studio 로 빌드됨)
        location /studio {
            proxy_pass http://studio;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # /admin → admin (basePath: /admin 로 빌드됨)
        location /admin {
            proxy_pass http://admin;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # / → learner (default)
        location / {
            proxy_pass http://learner;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
