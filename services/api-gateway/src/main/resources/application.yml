server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:*"
              - "https://*.lemuel.co.kr"
            allowedMethods: ["GET", "POST", "PATCH", "PUT", "DELETE", "OPTIONS"]
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/users/**
        - id: catalog-service
          uri: ${CATALOG_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/catalog/**
        - id: media-service
          uri: ${MEDIA_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/media/**

academy:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-must-be-at-least-256-bits-long}
  auth:
    # 콤마-구분 (Spring 이 List<String> 으로 자동 변환). YAML list 는 @Value 바인딩 안 됨.
    public-paths: "/api/users/signup,/api/users/login,/api/users/oauth/**,/api/users/dev/auto-login,/api/catalog/courses,/api/catalog/courses/**,/actuator/**"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
